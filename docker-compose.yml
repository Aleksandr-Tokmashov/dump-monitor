version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: dump_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dumps
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: dump_backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

networks:
  default:
    ipam:
      config:
        - subnet: 172.80.0.0/16